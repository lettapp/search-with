<!DOCTYPE html>
<title>Lett Search With</title>
<style>
html {
	--color-1:#161616;
	--color-2:#1a1b1c;
	--color-3:#202124;
	--color-4:#333;
	--text-color-1:#fff;
	--text-color-2:#e1eaf2;
	--text-color-3:#d3dee9;
	--text-color-4:#666;
	--text-color-5:#555;
	--active-color:#ff5722;
	--shadow-color:#111;
	--bg-color:var(--color-3);
}
* {
	color:inherit;
	margin:0;
	padding:0;
	outline:none;
	border:none;
	box-sizing:border-box;
}
::-webkit-scrollbar {
	display:none;
}
html, body {
	width:100%;
	height:100%;
}
html {
	background-color:var(--bg-color);
	color:var(--text-color-5);
}
body {
	font-family:sans-serif;
	font-size:13px;
	user-select:none;
}
svg {
	display:block;
	width:100%;
	stroke:currentColor;
	fill:currentColor;
}
.CSFlexItem {
	flex:1;
}
.CSView {
	width:100%;
	height:100%;
}
.CSButton {
	display:flex;
	align-items:center;
	justify-content:center;
	height:100%;
}
.CSMainView {
	padding:60px 20px 0;
	overflow:hidden;
}
.CSEditView {
	display:flex;
	flex-flow:column;
}
.CSItemsView {
	flex:1;
	margin:15px 0;
}
.CSMenu {
	display:flex;
	justify-content:center;
	position:absolute;
	top:0;
	left:0;
	width:100%;
	height:36px;
	border-bottom:1px solid var(--color-2);
}
.CSMenuItem {
	color:var(--text-color-4);
	border-bottom:2px solid;
	border-color:transparent;
	padding:4px 10px 0;
	font-size:14px;
}
.CSMenuItem.CSActive {
	color:var(--text-color-2);
	border-color:var(--text-color-2);
}
.CSTextInput {
	background-color:transparent;
	width:100%;
	height:100%;
}
.CSTextInput::placeholder {
	color:var(--text-color-5);
}
.CSAddItem {
	display:flex;
	align-items:center;
	background-color:var(--color-2);
	border:1px solid var(--color-1);
	border-radius:3px;
	min-height:34px;
}
.CSAddItemIcon {
	width:12px;
	margin:0 10px;
}
.CSAddItemInput {
	color:var(--text-color-1);
	font-size:14px;
	position:relative;
}
.CSAddItemInput .CSSuggestion {
	position:absolute;
	top:0;
	color:var(--text-color-4);
}
.CSAddItemInput input {
	position:relative;
	font-size:inherit;
}
.CSItem {
	background-color:var(--bg-color);
	display:flex;
	align-items:center;
	padding:6px 0;
	border-left:0 solid var(--active-color);
	box-shadow:none;
	transition:border-width 100ms, box-shadow 250ms;
}
.CSItem.CSDrag,
.CSItem.CSDragEnd {
	position:relative;
	z-index:1;
}
.CSItem.CSDrag {
	box-shadow:0px 4px 7px var(--shadow-color);
}
.CSItem.CSDragOver {
	border-left-width:4px;
}
.CSDragIcon {
	width:20px;
	margin-left:3px;
	margin-right:12px;
}
.CSDragIcon:hover {
	cursor:grabbing;
}
.CSRemoveIcon {
	width:16px;
	height:38px;
	margin-right:2px;
}
.CSRemoveIcon:hover {
	color:red;
}
.CSData {
	flex:1;
	padding-right:20px;
}
.CSDataInput {
	padding:2px 4px;
	text-overflow:ellipsis;
	cursor:default;
}
.CSDataInput[name=name] {
	color:var(--text-color-1);
}
.CSDataInput[name=link],
.CSDataInput::placeholder {
	color:var(--text-color-4);
	caret-color:var(--text-color-1);
}
</style>
<div hidden>
	<div protoid="UIDefault"></div>
	<div protoid="UIMainView" class="CSView CSMainView"></div>
	<div protoid="UIEditView" class="CSView CSEditView">
		<div class="CSMenu">
			<div class="CSButton CSMenuItem CSActive">Edit</div>
		</div>
		<div class="CSAddItem">
			<div class="CSAddItemIcon">
				<svg viewBox="0 0 16 16">
					<path d="M0 8 L16 8 M8 0 L8 16" stroke-width="2"></path>
				</svg>
			</div>
			<div class="CSFlexItem" id="addInput"></div>
		</div>
	</div>
	<div protoid="UIItemsView" class="CSItemsView"></div>
	<div protoid="UIItemView" class="CSItem">
		<div class="CSDragIcon" id="dragIcon"></div>
		<div class="CSData" id="dataContainer"></div>
		<div class="CSRemoveIcon" id="removeIcon"></div>
	</div>
	<input protoid="UITextInput" type="text" class="CSTextInput">
	<svg protoId="UIIconBars" viewBox="0 0 20 20">
		<path d="M0 8.5 L20 8.5 M0 11.5 L24 11.5 M0 14.5 L20 14.5" stroke-width="1"></path>
	</svg>
	<svg protoId="UIIconMinus" viewBox="0 0 16 16">
		<path d="M0 8 L16 8" stroke-width="2"></path>
	</svg>
	<svg protoId="UIIconPlus" viewBox="0 0 16 16">
		<path d="M0 8 L16 8 M8 0 L8 16" stroke-width="2"></path>
	</svg>
</div>
<script src="/js/options.js"></script>
